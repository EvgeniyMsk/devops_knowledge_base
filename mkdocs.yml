site_name: DevOps база знаний
site_url: https://devops.evgeniymsk.ru/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - На главную: index.md
  - Networking:
    - Обзор: networking/networking.md
    - 1. Базовая теория сетей: networking/topic-1-basis.md
    - 2. IP-сети и маршрутизация: networking/topic-2-ip-routing.md
    - 3. TCP и UDP: networking/topic-3-tcp-udp.md
    - 4. DNS: networking/topic-4-dns.md
    - 5. HTTP и HTTPS (L7): networking/topic-5-http-https.md
    - 6. Linux Networking: networking/topic-6-linux-networking.md
    - 7. Load Balancing и Proxy: networking/topic-7-load-balancing-proxy.md
    - 8. Kubernetes Networking: networking/topic-8-kubernetes-networking.md
    - 9. Observability и отладка: networking/topic-9-observability-troubleshooting.md
  - Git:
    - Обзор: git/git.md
    - 1. Базис: git/topic-1-basis.md
    - 2. Индекс (staging): git/topic-2-staging.md
    - 3. Ветки и слияние: git/topic-3-branches.md
    - 4. Remote и синхронизация: git/topic-4-remote.md
    - 5. Отмена и восстановление: git/topic-5-undo.md
    - 6. Продвинутые операции: git/topic-6-advanced.md
    - 7. Конфигурация и практики: git/topic-7-config.md
    - 8. Git в CI/CD: git/topic-8-cicd.md
  - Linux:
    - Обзор: linux/linux.md
    - 1. Архитектура и основы ОС: linux/topic-1-architecture.md
    - 2. Файловая система и диски: linux/topic-2-filesystem-disks.md
    - 3. Пользователи и безопасность: linux/topic-3-users-security.md
    - 4. Процессы, CPU, память: linux/topic-4-processes-cpu-memory.md
    - 5. Сеть в Linux: linux/topic-5-networking.md
    - 6. Логи и observability: linux/topic-6-logs-observability.md
    - 7. Bash и shell scripting: linux/topic-7-bash-scripting.md
    - 8. Управление пакетами: linux/topic-8-package-management.md
    - 9. Linux и контейнеры: linux/topic-9-linux-containers.md
    - 10. Troubleshooting: linux/topic-10-troubleshooting-mindset.md
  - IaC:
    - Ansible: iac/ansible.md
    - Terrarofm: iac/terraform.md
  - Docker:
    - Обзор: docker/docker.md
    - 1. Базис: docker/topic-1-basis.md
    - 2. Архитектура: docker/topic-2-architecture.md
    - 3. Образы: docker/topic-3-images.md
    - 4. Контейнеры как процессы: docker/topic-4-containers.md
    - 5. Сеть: docker/topic-5-networking.md
    - 6. Тома и хранилище: docker/topic-6-volumes.md
    - 7. Docker Compose: docker/topic-7-compose.md
    - 8. Безопасность: docker/topic-8-security.md
    - 9. Registry и образы: docker/topic-9-registry.md
    - 10. Docker в CI/CD: docker/topic-10-cicd.md
    - 11. Docker в production: docker/topic-11-production.md
    - 12. Отладка и troubleshooting: docker/topic-12-troubleshooting.md
    - 13. Docker и Kubernetes: docker/topic-13-kubernetes.md
    - 14. Справочник CLI: docker/topic-14-cli-reference.md
  - Kubernetes:
    - Обзор: kubernetes/kubernetes.md
    - 1. База (Linux, сеть, контейнеры): kubernetes/topic-1-basis.md
    - 2. Архитектура: kubernetes/topic-2-architecture.md
    - 3. Workloads и API: kubernetes/topic-3-workloads-api.md
    - 4. Сеть в Kubernetes: kubernetes/topic-4-networking.md
    - 5. Безопасность: kubernetes/topic-5-security.md
    - 6. Хранилище: kubernetes/topic-6-storage.md
    - 7. Наблюдаемость: kubernetes/topic-7-observability.md
    - 8. Автомасштабирование и отказоустойчивость: kubernetes/topic-8-autoscaling-resilience.md
    - 9. CI/CD и GitOps: kubernetes/topic-9-cicd-gitops.md
    - 10. Отладка и эксплуатация: kubernetes/topic-10-troubleshooting-production.md
    - 11. Архитектура и Best Practices: kubernetes/topic-11-architecture-best-practices.md
    - Helm: kubernetes/helm.md
  - CI/CD:
    - Jenkins: ci-cd/jenkins.md
    - GitLab: ci-cd/gitlab.md
  - GitOps:
    - ArgoCD: gitops/argocd.md
  - База данных: 
    - PostgreSQL:
      - Обзор: database/postgresql.md
      - 1. База (архитектура, конфигурация, безопасность): database/postgresql/topic-1-basis.md
      - 2. Эксплуатация и стабильность: database/postgresql/topic-2-operations-stability.md
      - 3. High Availability и масштабирование: database/postgresql/topic-3-ha-scaling.md
      - 4. Производительность и диагностика: database/postgresql/topic-4-performance-diagnostics.md
      - 5. Мониторинг и алертинг: database/postgresql/topic-5-monitoring-alerting.md
      - 6. Автоматизация и DevOps: database/postgresql/topic-6-automation-devops.md
    - MySQL: database/mysql.md
    - MongoDB: database/mongodb.md
    - Redis: database/redis.md
  - Брокеры сообщений:
    - RabbitMQ: message-broker/rabbitmq.md
    - Kafka: message-broker/kafka.md
    - Nats: message-broker/nats.md
  - Обратная связь: contact/contact.md

theme:
  name: material
  language: ru
  features:
    - content.code.copy
    - navigation.top
    - navigation.instant          # быстрые переходы
    - navigation.instant.progress # полоска загрузки
    - navigation.tracking         # якорь в URL
    - navigation.tabs              # вкладки в шапке
    - navigation.path             # хлебные крошки
    - toc.follow  